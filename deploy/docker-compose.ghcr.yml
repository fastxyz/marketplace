services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fast_marketplace}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  facilitator:
    image: ${FACILITATOR_IMAGE:?set FACILITATOR_IMAGE}
    restart: unless-stopped
    environment:
      FACILITATOR_PORT: 4020
      FACILITATOR_FAST_RPC_URL: ${FACILITATOR_FAST_RPC_URL:?set FACILITATOR_FAST_RPC_URL}
      FACILITATOR_EVM_PRIVATE_KEY: ${FACILITATOR_EVM_PRIVATE_KEY:-}
    expose:
      - "4020"

  api:
    image: ${API_IMAGE:?set API_IMAGE}
    restart: unless-stopped
    depends_on:
      - postgres
      - facilitator
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-fast_marketplace}
      MARKETPLACE_TREASURY_ADDRESS: ${MARKETPLACE_TREASURY_ADDRESS:?set MARKETPLACE_TREASURY_ADDRESS}
      MARKETPLACE_FACILITATOR_URL: http://facilitator:4020
      MARKETPLACE_SESSION_SECRET: ${MARKETPLACE_SESSION_SECRET:?set MARKETPLACE_SESSION_SECRET}
      MARKETPLACE_ADMIN_TOKEN: ${MARKETPLACE_ADMIN_TOKEN:?set MARKETPLACE_ADMIN_TOKEN}
      MARKETPLACE_SECRETS_KEY: ${MARKETPLACE_SECRETS_KEY:?set MARKETPLACE_SECRETS_KEY}
      MARKETPLACE_FAST_NETWORK: ${MARKETPLACE_FAST_NETWORK:?set MARKETPLACE_FAST_NETWORK}
      MARKETPLACE_BASE_URL: ${MARKETPLACE_BASE_URL:?set MARKETPLACE_BASE_URL}
      MARKETPLACE_WEB_BASE_URL: ${MARKETPLACE_WEB_BASE_URL:?set MARKETPLACE_WEB_BASE_URL}
      PORT: 3000
    ports:
      - "${API_PORT:-3000}:3000"

  worker:
    image: ${WORKER_IMAGE:?set WORKER_IMAGE}
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-fast_marketplace}
      MARKETPLACE_TREASURY_PRIVATE_KEY: ${MARKETPLACE_TREASURY_PRIVATE_KEY:-}
      MARKETPLACE_TREASURY_KEYFILE: ${MARKETPLACE_TREASURY_KEYFILE:-}
      MARKETPLACE_SECRETS_KEY: ${MARKETPLACE_SECRETS_KEY:?set MARKETPLACE_SECRETS_KEY}
      MARKETPLACE_FAST_NETWORK: ${MARKETPLACE_FAST_NETWORK:?set MARKETPLACE_FAST_NETWORK}
      FAST_RPC_URL: ${FAST_RPC_URL:?set FAST_RPC_URL}
      WORKER_POLL_INTERVAL_MS: ${WORKER_POLL_INTERVAL_MS:-5000}

  web:
    image: ${WEB_IMAGE:?set WEB_IMAGE}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      MARKETPLACE_API_BASE_URL: ${MARKETPLACE_API_BASE_URL:?set MARKETPLACE_API_BASE_URL}
      NEXT_PUBLIC_MARKETPLACE_API_BASE_URL: ${NEXT_PUBLIC_MARKETPLACE_API_BASE_URL:?set NEXT_PUBLIC_MARKETPLACE_API_BASE_URL}
      MARKETPLACE_WEB_BASE_URL: ${MARKETPLACE_WEB_BASE_URL:?set MARKETPLACE_WEB_BASE_URL}
      MARKETPLACE_ADMIN_TOKEN: ${MARKETPLACE_ADMIN_TOKEN:?set MARKETPLACE_ADMIN_TOKEN}
      MARKETPLACE_FAST_NETWORK: ${MARKETPLACE_FAST_NETWORK:?set MARKETPLACE_FAST_NETWORK}
      PORT: 3000
    ports:
      - "${WEB_PORT:-3001}:3000"

volumes:
  postgres_data:
